<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">agentflow workflow animation</title>
  <desc id="desc">An animated workflow diagram showing a task moving through Developer, Tester, Reviewer, and Done, with a repair loop from Tester back to Developer.</desc>
  <defs>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="110" y1="130" x2="1090" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-40%" width="140%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.14 0 0 0 0 0.54 0 0 0 0 0.72 0 0 0 0.7 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <path id="mainPath" d="M116 142 C190 96 246 96 320 142 S450 188 524 142 S654 96 728 142 S858 188 932 142 S1022 100 1084 142"/>
    <path id="repairPath" d="M710 244 C620 340 446 340 354 244"/>
    <style>
      .rail {
        stroke-dasharray: 10 18;
        animation: flow 1.9s linear infinite;
      }
      .rail-slow {
        stroke-dasharray: 6 16;
        animation: flowBack 2.4s linear infinite;
      }
      .node {
        animation: breathe 3.8s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .node:nth-of-type(2) { animation-delay: .18s; }
      .node:nth-of-type(3) { animation-delay: .36s; }
      .node:nth-of-type(4) { animation-delay: .54s; }
      .node:nth-of-type(5) { animation-delay: .72s; }
      @keyframes flow {
        to { stroke-dashoffset: -56; }
      }
      @keyframes flowBack {
        to { stroke-dashoffset: 44; }
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.025); }
      }
    </style>
  </defs>

  <g opacity="0.22">
    <circle cx="120" cy="78" r="56" fill="#DBEAFE"/>
    <circle cx="1052" cy="315" r="72" fill="#CCFBF1"/>
    <circle cx="600" cy="348" r="120" fill="#E0F2FE"/>
  </g>

  <use href="#mainPath" stroke="#C7D2FE" stroke-width="18" stroke-linecap="round" opacity="0.34"/>
  <use href="#mainPath" class="rail" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.86"/>
  <use href="#repairPath" stroke="#BAE6FD" stroke-width="16" stroke-linecap="round" opacity="0.25"/>
  <use href="#repairPath" class="rail-slow" stroke="#0284C7" stroke-width="3.5" stroke-linecap="round" opacity="0.62"/>

  <g filter="url(#glow)">
    <circle r="8" fill="#2563EB">
      <animateMotion dur="3.4s" repeatCount="indefinite" rotate="auto">
        <mpath href="#mainPath"/>
      </animateMotion>
    </circle>
    <circle r="5" fill="#14B8A6">
      <animateMotion dur="3.4s" begin="1.15s" repeatCount="indefinite" rotate="auto">
        <mpath href="#mainPath"/>
      </animateMotion>
    </circle>
    <circle r="6" fill="#0EA5E9">
      <animateMotion dur="2.9s" begin=".4s" repeatCount="indefinite" rotate="auto">
        <mpath href="#repairPath"/>
      </animateMotion>
    </circle>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#softShadow)">
    <g class="node">
      <rect x="54" y="100" width="124" height="84" rx="24" fill="url(#node)" stroke="#BFDBFE"/>
      <text x="116" y="137" text-anchor="middle" fill="#0F172A" font-size="20" font-weight="800">Task</text>
      <text x="116" y="162" text-anchor="middle" fill="#475569" font-size="13">user intent</text>
    </g>

    <g class="node">
      <rect x="270" y="100" width="166" height="84" rx="24" fill="url(#node)" stroke="#93C5FD"/>
      <text x="353" y="137" text-anchor="middle" fill="#0F172A" font-size="20" font-weight="800">Developer</text>
      <text x="353" y="162" text-anchor="middle" fill="#475569" font-size="13">implements</text>
    </g>

    <g class="node">
      <rect x="508" y="100" width="166" height="84" rx="24" fill="url(#node)" stroke="#67E8F9"/>
      <text x="591" y="137" text-anchor="middle" fill="#0F172A" font-size="20" font-weight="800">Tester</text>
      <text x="591" y="162" text-anchor="middle" fill="#475569" font-size="13">verifies</text>
    </g>

    <g class="node">
      <rect x="746" y="100" width="166" height="84" rx="24" fill="url(#node)" stroke="#5EEAD4"/>
      <text x="829" y="137" text-anchor="middle" fill="#0F172A" font-size="20" font-weight="800">Reviewer</text>
      <text x="829" y="162" text-anchor="middle" fill="#475569" font-size="13">approves</text>
    </g>

    <g class="node">
      <rect x="1022" y="100" width="124" height="84" rx="24" fill="url(#node)" stroke="#99F6E4"/>
      <text x="1084" y="137" text-anchor="middle" fill="#0F172A" font-size="20" font-weight="800">Done</text>
      <text x="1084" y="162" text-anchor="middle" fill="#475569" font-size="13">report</text>
    </g>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="466" y="276" width="178" height="36" rx="18" fill="#F0F9FF" stroke="#BAE6FD"/>
    <text x="555" y="299" text-anchor="middle" fill="#0369A1" font-size="14" font-weight="700">failed → route back</text>

    <rect x="724" y="230" width="180" height="36" rx="18" fill="#F0FDFA" stroke="#99F6E4"/>
    <text x="814" y="253" text-anchor="middle" fill="#0F766E" font-size="14" font-weight="700">blocked → resume point</text>
  </g>
</svg>
