<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AGENTFLOW</title>
  <desc id="desc">A gradient banner for the agentflow Claude Code workflow tool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.48" stop-color="#312E81"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="line" x1="170" y1="190" x2="1030" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.42 0 0 0 0 0.62 0 0 0 0 1 0 0 0 0.45 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
  <g opacity="0.22">
    <circle cx="165" cy="92" r="140" fill="#A78BFA"/>
    <circle cx="1040" cy="278" r="180" fill="#2DD4BF"/>
  </g>
  <g filter="url(#glow)">
    <path d="M180 206H340L440 146L560 226L690 126L820 206H1020" stroke="url(#line)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="180" cy="206" r="18" fill="#C4B5FD"/>
    <circle cx="340" cy="206" r="18" fill="#A78BFA"/>
    <circle cx="440" cy="146" r="18" fill="#60A5FA"/>
    <circle cx="560" cy="226" r="18" fill="#38BDF8"/>
    <circle cx="690" cy="126" r="18" fill="#22D3EE"/>
    <circle cx="820" cy="206" r="18" fill="#5EEAD4"/>
    <circle cx="1020" cy="206" r="18" fill="#99F6E4"/>
  </g>
  <text x="600" y="140" text-anchor="middle" fill="white" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="72" font-weight="800" letter-spacing="10">AGENTFLOW</text>
  <text x="600" y="270" text-anchor="middle" fill="#D1FAE5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="500">Developer writes · Tester verifies · Reviewer approves</text>
</svg>
